
<!DOCTYPE html>

  <link rel="stylesheet" href="https://www.tsvan.xyz/styles.css">
  <script>
    (function() {
      var saved = localStorage.getItem('theme');
      var sysDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      document.documentElement.setAttribute('data-theme', saved || (sysDark ? 'dark' : 'light'));
    })();
  </script>
  
</head>
<body>

<header>
  
    <a class="name" href="https://www.tsvan.xyz">
      Truong-Son Van

    <a href="https://www.tsvan.xyz/useful/" class="active" aria-current="page">Useful</a>
    <button class="theme-toggle" id="themeToggle" aria-label="Toggle light/dark theme"></button>
  </nav>
</header>


    

<main>
  
  <section aria-labelledby="label-plugins">
    <h2 class="section-label" id="label-plugins">Neovim Plugins</h2>
    <ul class="course-list">
      
      <li>
        <div class="course-title">

    </ul>

<footer>
  Truong-Son Van &nbsp;·&nbsp; Ho Chi Minh City, Vietnam

  </div>

  <script>
    var btn = document.getElementById('themeToggle');
    if (btn) {
      btn.addEventListener('click', function() {
        var next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', next);
        localStorage.setItem('theme', next);
      });
    }
  </script>
</body>
